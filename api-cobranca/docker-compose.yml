  #   restart: unless-stopped
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     POSTGRES_USER: ${POSTGRES_USER:-cobrapix}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cobrapix_password}
  #     POSTGRES_DB: ${POSTGRES_DB:-cobrapix}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - cobrapix-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cobrapix}"]
  #     interval: 10s
  #     timeout: 5s
