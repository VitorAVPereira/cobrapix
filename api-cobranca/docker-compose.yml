version: '3.8'

services:
  # 🟢 1. O BANCO DE DADOS POSTGRES (Para a Evolution)
  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_password_secure
      POSTGRES_DB: evolution
    volumes:
      - evolution_pg_data:/var/lib/postgresql/data
    networks:
      - cobrapix-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U evolution" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🔴 2. O CORAÇÃO ASSÍNCRONO (REDIS ÚNICO PARA AMBOS)
  redis-queue:
    image: redis:7-alpine
    container_name: redis-queue
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - cobrapix-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🔵 3. O MOTOR DO WHATSAPP (EVOLUTION V2)
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-whatsapp
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      evolution-db:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    environment:
      SERVER_TYPE: http
      PORT: 8080
      HOST: 0.0.0.0

      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evolution_api_key_secret_change_in_production}

      # --- CONEXÃO POSTGRES ---
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://evolution:evolution_password_secure@evolution-db:5432/evolution?schema=public"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution_api"

      # --- 🚀 CONEXÃO REDIS (A MÁGICA DA PERFORMANCE AQUI) ---
      CACHE_REDIS_ENABLED: "true"
      # Apontamos para o container redis-queue, usando o banco lógico 1 (/1)
      CACHE_REDIS_URI: "redis://redis-queue:6379/1"
      CACHE_REDIS_PREFIX_KEY: "evolution"
      # Desligamos o cache local para salvar a memória RAM da máquina
      CACHE_LOCAL_ENABLE: "false"

      # --- SEGURANÇA E WEBHOOK ---
      AUTHENTICATION_TYPE: jwt
      JWT_SECRET: ${EVOLUTION_JWT_SECRET:-jwt_secret_change_in_production}
      JWT_EXPIRATION_IN: 604800

      WEBHOOK_ENABLED: true
      WEBHOOK_GLOBAL_URL: ${EVOLUTION_WEBHOOK_URL:-http://host.docker.internal:3001/webhooks/evolution}
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: false
      WEBHOOK_GLOBAL_BASE64: false
      WEBHOOK_EVENTS: CONNECTION_UPDATE

      MESSAGE_EXPIRED: 300

      # --- BLINDAGEM ANTI-BANIMENTO ---
      DELAY_SEND_MESSAGE: 5000
      CONFIG_SESSION_PHONE_CLIENT: Chrome
      REJECT_CALL: true
      REJECT_CALL_MESSAGE: "Olá! Nosso canal de atendimento é exclusivo por texto. Por favor, digite sua dúvida e nossa equipe financeira irá responder em breve."
      SEND_PRESENCE: true

      # --- ESTABILIDADE ---
      RECONNECT_INTERVAL: 30000
      MAX_RECONNECT: 100
      QRCODE_LIMIT: 5
      QRCODE_ALWAYS: true

      LOG_LEVEL: INFO
      LOG_COLOR: true
      SECURE_NOTIFICATION: false

    volumes:
      - evolution_sessions:/app/sessions
      - evolution_qrcodes:/app/qrcodes
      - evolution_logs:/app/logs
    networks:
      - cobrapix-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  cobrapix-network:
    driver: bridge
    name: cobrapix-network

volumes:
  evolution_pg_data:
    driver: local
  evolution_sessions:
    driver: local
  evolution_qrcodes:
    driver: local
  evolution_logs:
    driver: local