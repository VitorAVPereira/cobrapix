networks:
  cobrapix-network:
    driver: bridge
    name: cobrapix-network

volumes:
  evolution_data:
    driver: local
    name: evolution_data
  evolution_sessions:
    driver: local
    name: evolution_sessions
  evolution_qrcodes:
    driver: local
    name: evolution_qrcodes
  evolution_logs:
    driver: local
    name: evolution_logs
